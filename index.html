<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOP ACC FREE FIRE</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.box{
background:#222;
margin:20px;
padding:20px;
border-radius:10px;
}

button{
background:orange;
border:none;
padding:10px 20px;
color:white;
border-radius:5px;
}

input{
padding:8px;
margin:5px;
}

</style>
</head>

<body>

<h1>SHOP ACC FREE FIRE</h1>

<div class="box">

<h2>Đăng ký</h2>

<input id="user" placeholder="Tên tài khoản">

<input id="pass" placeholder="Mật khẩu">

<button onclick="register()">Đăng ký</button>

</div>

<div class="box">

<h2>Đăng nhập</h2>

<input id="loginUser" placeholder="Tên tài khoản">

<input id="loginPass" placeholder="Mật khẩu">

<button onclick="login()">Đăng nhập</button>

</div>

<div class="box">

<h2>Nạp tiền</h2>

<p>Số Tài Khoản: 0329772293</p>
<p>Ngân Hàng: MBBank</p>
<p>Tên: LE NGUYEN TRUNG NAM</p>

<p>Chuyển khoản và ghi nội dung:</p>

<b id="napuser">Tên Tài Khoản</b>

</div>

<div class="box">

<h2>Túi mù 49K</h2>

<button onclick="play()">Chơi ngay</button>

</div>

<script>

function register(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value

localStorage.setItem(user,pass)

alert("Đăng ký thành công")

}

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

if(localStorage.getItem(user)==pass){

localStorage.setItem("login",user)

document.getElementById("napuser").innerText=user

alert("Đăng nhập thành công")

}else{

alert("Sai tài khoản")

}

}

function play(){

let user=localStorage.getItem("login")

if(!user){

alert("Bạn cần đăng nhập")

return

}

alert("Mở túi thành công!")

}

</script>

</body>
</html>
